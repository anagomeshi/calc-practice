<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>計算練習</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div class="app-chrome">
        <div class="header">
            <span>計算練習</span>
            <button onclick="toggleSettingsView()">
                <img src="img/gear.svg" alt="" draggable="false">
            </button>
        </div>
        <div class="question">
            <div class="formula">
                <span class="first-number"></span>
                <span class="sign"></span>
                <span class="second-number"></span>
            </div>
            <div ></div>
            <div class="answer-box"></div>
        </div>
        <div class="spacing"></div>
        <div>
            <button class="show-answer-button" onclick="showAnswer()">答えを表示</button>
        </div>
        <div class="settings">
            <div class="settings-contents">
                <span>1桁 と 3桁の 足し算</span>
                <div>
                    <input type="radio" name="first-number-digits" value="1" id="first-number-1digits">
                    <label for="first-number-1digits">1桁</label>
                    <input type="radio" name="first-number-digits" value="2" id="first-number-2digits" checked>
                    <label for="first-number-2digits">2桁</label>
                    <input type="radio" name="first-number-digits" value="3" id="first-number-3digits">
                    <label for="first-number-3digits">3桁</label>
                    <input type="radio" name="first-number-digits" value="4" id="first-number-4digits">
                    <label for="first-number-4digits">4桁</label>
                </div>
                <div>
                    <input type="radio" name="second-number-digits" value="1" id="second-number-1digits">
                    <label for="second-number-1digits">1桁</label>
                    <input type="radio" name="second-number-digits" value="2" id="second-number-2digits" checked>
                    <label for="second-number-2digits">2桁</label>
                    <input type="radio" name="second-number-digits" value="3" id="second-number-3digits">
                    <label for="second-number-3digits">3桁</label>
                    <input type="radio" name="second-number-digits" value="4" id="second-number-4digits">
                    <label for="second-number-4digits">4桁</label>
                </div>
                <div>
                    <input type="radio" name="sign-type" value="addition" id="addition">
                    <label for="addition">足し算</label>
                    <input type="radio" name="sign-type" value="multiplication" id="multiplication" checked>
                    <label for="multiplication">掛け算</label>
                </div>
                <button onclick="toggleSettingsView()">OK</button>
            </div>
        </div>
    </div>
    </div>
    <script type="text/javascript" src="script.js"></script>
</body>

</html>
